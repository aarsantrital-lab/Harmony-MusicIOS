name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Fix Bundle ID in Xcode project
        run: |
          # Change Bundle ID from original to your unique one
          sed -i '' 's/com\.anandnet\.harmonymusic/com.aarsanop.harmonymusic/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Decode and import signing certificate
        run: |
          echo "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          echo "${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}" | base64 --decode > profile.mobileprovision

          security create-keychain -p temp_keychain_password build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp_keychain_password build.keychain
          security import certificate.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k temp_keychain_password build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: flutter build ipa --release --build-args "DEVELOPMENT_TEAM=Q54GH6LT39 PROVISIONING_PROFILE_SPECIFIER=HarmonyMusicIOS"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HarmonyMusic.ipa
          path: build/ios/ipa/*.ipa
